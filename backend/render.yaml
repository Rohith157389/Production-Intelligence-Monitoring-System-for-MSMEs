services:
  - type: web
    name: pmrs-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MEMORY_DB
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: pmrs-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: IOT_API_KEY
        generateValue: true
      - key: CURRENT_OVERLOAD_THRESHOLD
        value: 15
      - key: TEMPERATURE_OVERLOAD_THRESHOLD
        value: 75
      - key: RPM_DROP_PERCENT
        value: 20
      - key: VOLTAGE_MIN_THRESHOLD
        value: 200
      - key: STOPPAGE_DURATION_MINUTES
        value: 5

databases:
  - name: pmrs-db
    plan: free
    databaseName: pmrs
    user: pmrs_user
